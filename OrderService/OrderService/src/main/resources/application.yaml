server:
    port: 8083

spring:
  application:
      name: ORDER-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/smart_shop_order
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/